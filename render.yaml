services:
  - type: web
    name: quran-khatma
    runtime: node
    region: frankfurt
    plan: free
    branch: main
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: quran_khatma
      - key: NODE_VERSION
        value: 20
